<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RepoLens before and after</title>
  <desc id="desc">Before RepoLens, an agent repeats full-file reads. With RepoLens, the duplicate read is blocked and range reads are allowed.</desc>
  <rect width="1280" height="640" fill="#0b0f14"/>
  <text x="640" y="82" fill="#f4f8fb" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="44" font-weight="800" text-anchor="middle">Same task, less wasted context.</text>
  <rect x="80" y="130" width="530" height="410" rx="18" fill="#111820" stroke="#263241" stroke-width="2"/>
  <rect x="670" y="130" width="530" height="410" rx="18" fill="#111820" stroke="#263241" stroke-width="2"/>
  <text x="116" y="190" fill="#ff8f8f" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="700">Before RepoLens</text>
  <text x="706" y="190" fill="#28d17c" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="700">With RepoLens</text>

  <text x="116" y="256" fill="#d7e3ee" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="26">read src/plugin.ts</text>
  <text x="116" y="310" fill="#d7e3ee" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="26">read src/plugin.ts</text>
  <text x="116" y="364" fill="#d7e3ee" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="26">read src/plugin.ts</text>
  <rect x="116" y="414" width="330" height="54" rx="8" fill="#251717" stroke="#7d3030"/>
  <text x="136" y="449" fill="#ff8f8f" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22">context keeps growing</text>

  <text x="706" y="256" fill="#d7e3ee" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="26">1st full read allowed</text>
  <text x="706" y="310" fill="#ffcf6e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="26">2nd full read blocked</text>
  <text x="706" y="364" fill="#72d6ff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="26">range read still allowed</text>
  <rect x="706" y="414" width="340" height="54" rx="8" fill="#10251d" stroke="#28d17c"/>
  <text x="726" y="449" fill="#28d17c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22">context stays focused</text>
</svg>
