<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RepoLens social preview</title>
  <desc id="desc">RepoLens for OpenCode. Stop wasting context on the same file twice.</desc>
  <rect width="1280" height="640" fill="#0b0f14"/>
  <rect x="64" y="64" width="1152" height="512" rx="28" fill="#111820" stroke="#223042" stroke-width="2"/>
  <text x="110" y="160" fill="#28d17c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24">RepoLens for OpenCode</text>
  <text x="110" y="252" fill="#f4f8fb" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="72" font-weight="800">Stop wasting context</text>
  <text x="110" y="334" fill="#f4f8fb" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="72" font-weight="800">on the same file twice.</text>
  <text x="114" y="402" fill="#9bb0c7" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28">Repeat-read interception, large-file warnings, repo memory, and token bookkeeping.</text>

  <rect x="826" y="146" width="286" height="70" rx="12" fill="#17222d" stroke="#2a3a4c"/>
  <text x="969" y="190" fill="#d7e3ee" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" text-anchor="middle">Read</text>
  <path d="M969 226V264" stroke="#536a83" stroke-width="4" stroke-linecap="round"/>
  <path d="M957 252L969 266L981 252" stroke="#536a83" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="826" y="274" width="286" height="70" rx="12" fill="#10251d" stroke="#28d17c"/>
  <text x="969" y="318" fill="#28d17c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" text-anchor="middle">RepoLens</text>
  <path d="M969 354V392" stroke="#536a83" stroke-width="4" stroke-linecap="round"/>
  <path d="M957 380L969 394L981 380" stroke="#536a83" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="756" y="402" width="180" height="70" rx="12" fill="#251d10" stroke="#ffcf6e"/>
  <text x="846" y="446" fill="#ffcf6e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" text-anchor="middle">Block repeat</text>
